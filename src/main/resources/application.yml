spring:
  application:
    name: springbootdeveloper

  datasource:
    url: jdbc:h2:mem:todo-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

    jpa:
      hibernate:
        ddl-auto: create
      defer-datasource-initialization: true   # 🔥 이거 추가
      show-sql: true
      properties:
        hibernate:
          format_sql: true
server:
  port: 8080