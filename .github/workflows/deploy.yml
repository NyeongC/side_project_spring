name: Deploy Spring Boot

on:
#  push:
#    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: JDK 설치
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 권한 부여
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew build

      - name: 서버로 jar 전송
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      - name: 서버 실행
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "기존 프로세스 종료"
            if [ -f /home/ubuntu/app/app.pid ]; then
              kill -15 $(cat /home/ubuntu/app/app.pid) || true
              rm -f /home/ubuntu/app/app.pid
            fi

            echo "새 애플리케이션 실행"
            cd /home/ubuntu/app

            JAR=$(ls *.jar | head -n 1)
            echo "실행할 jar: $JAR"

            nohup java -jar $JAR > app.log 2>&1 < /dev/null &

            echo $! > app.pid

            disown

            echo "배포 완료"